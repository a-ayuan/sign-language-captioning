project:
  name: transformer_wlasl_ctc
  output_root: outputs/runs/transformer_wlasl_ctc
  seed: 42

data:
  train_manifest: outputs/wlasl_features/manifests/train.csv
  val_manifest: outputs/wlasl_features/manifests/val.csv
  test_manifest: outputs/wlasl_features/manifests/test.csv
  vocab_path: outputs/wlasl_features/manifests/vocab.json
  num_workers: 0
  batch_size: 8
  max_frames: 128
  input_dim: 450
  use_weighted_sampler: true

task:
  type: isolated_sign
  prediction_mode: clip

model:
  type: transformer
  d_model: 384
  nhead: 8
  num_layers: 4
  dim_feedforward: 1536
  dropout: 0.1
  input_dropout: 0.1

optimizer:
  lr: 0.0005
  weight_decay: 0.0001

scheduler:
  name: reduce_on_plateau
  factor: 0.5
  patience: 3
  min_lr: 0.00001

loss:
  ctc_weight: 0.2
  ce_weight: 1.0
  label_smoothing: 0.05

augmentation:
  enabled: true
  rotation_degrees: 10.0
  gaussian_noise_std: 0.001
  temporal_speed_min: 0.9
  temporal_speed_max: 1.1
  frame_dropout_prob: 0.03

training:
  epochs: 50
  grad_clip_norm: 1.0
  early_stopping_patience: 10
  device: cuda

streaming:
  window_size: 32
  stride: 8
  commit_repeats: 2
